# ============================================================
#  default.yaml — Configurazione globale condivisa
#  Tutti i valori qui sono override-abili dai config specifici
# ============================================================

# ── Percorsi ─────────────────────────────────────────────────
paths:
  fivek_root:      "data/fivek"          # Radice dataset MIT-Adobe FiveK
  custom_root:     "data/custom"         # Coppie del fotografo target
  checkpoints_dir: "checkpoints"
  logs_dir:        "logs"
  output_dir:      "outputs"

# ── Pre-elaborazione RAW ─────────────────────────────────────
raw:
  target_long_side: 768          # L_train: lato lungo per training crop
  lanczos_a: 3                   # Parametro filtro Lanczos
  bayer_pattern: "RGGB"          # Pattern CFA di default
  # Normalizzazione ImageNet (canali BGR → RGB già gestito in pipeline)
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

# ── Architettura ─────────────────────────────────────────────
model:
  # Encoder CNN stem
  encoder_backbone: "efficientnet_b0"   # timm model name
  encoder_frozen_stages: [1, 2]         # Stage congelati nella few-shot adapt.

  # Swin Transformer
  swin_window_size: 7            # M×M window size
  swin_num_heads:   [8, 16]      # Teste di attenzione stage 4 e 5
  swin_depths:      [2, 2]       # Layer Swin per stage 4 e 5
  use_rope: true                 # Rotary Position Embedding

  # Style encoder (condiviso con CNN stem + GAP)
  style_embedding_dim: 512       # Dimensione Enc(I) prima del GAP

  # Set Transformer
  set_transformer_dim:    128    # Dimensione interna Set Transformer
  set_transformer_heads:  8
  set_transformer_layers: 2

  # Cross-Attention
  cross_attention_dim: 128
  cross_attention_heads: 4

  # Bilateral Grid
  bil_grid_global_h: 8
  bil_grid_global_w: 8
  bil_grid_local_h:  32
  bil_grid_local_w:  32
  bil_grid_depth:    8           # L_b: numero bin luminanza
  bil_grid_coeffs:   12          # 3×3 matrice + 3 bias = 12

  # Style prototype
  prototype_dim: 128

# ── Loss ─────────────────────────────────────────────────────
loss:
  # Pesi finali (fase 11+, sezione 6.6)
  lambda_delta_e:  0.5
  lambda_hist:     0.3
  lambda_perc:     0.4
  lambda_style:    0.2
  lambda_cos:      0.15
  lambda_chroma:   0.2
  lambda_id:       0.5

  # Histogram
  hist_bins:       64
  hist_sigma_bin:  null          # null → calcolato come 1/(2*bins)

  # Perceptual / Style (VGG19 layers)
  vgg_layers:      ["relu1_2", "relu2_2", "relu3_4", "relu4_4"]
  vgg_weights:     [1.0, 0.75, 0.5, 0.25]

  # Identity loss probability
  identity_prob:   0.2

  # Chroma
  chroma_hue_weight: 0.5        # Peso relativo di L_hue in L_chroma

  # Consistency
  consistency_threshold: 0.7    # τ_cons
  consistency_weight:    0.1

  # CIEDE2000 epsilon (numerical stability)
  delta_e_eps: 1.0e-8

# ── Ottimizzatore ────────────────────────────────────────────
optimizer:
  type:         "adamw"
  betas:        [0.9, 0.999]
  eps:          1.0e-8
  weight_decay: 2.0e-3
  grad_clip:    1.0             # max_norm per gradient clipping

# ── Hardware ─────────────────────────────────────────────────
hardware:
  device:        "cuda"         # "cuda" | "cpu" | "mps"
  num_workers:   4
  pin_memory:    true
  amp:           true           # Automatic Mixed Precision (fp16)
  compile:       false          # torch.compile (richiede PyTorch ≥ 2.0)

# ── Logging ──────────────────────────────────────────────────
logging:
  use_tensorboard: true
  log_every_n_steps: 10
  save_every_n_epochs: 5
  keep_last_n_checkpoints: 3